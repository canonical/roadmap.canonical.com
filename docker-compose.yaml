services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roadmap
      POSTGRES_PASSWORD: roadmap
      POSTGRES_DB: roadmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadmap"]
      interval: 2s
      timeout: 3s
      retries: 10

  # Separate DB for tests so they never touch dev data
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roadmap
      POSTGRES_PASSWORD: roadmap
      POSTGRES_DB: roadmap_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadmap"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
