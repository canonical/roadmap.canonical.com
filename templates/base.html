<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Roadmap{% endblock %}</title>

  <!-- Vanilla Framework from CDN -->
  <link rel="stylesheet" href="https://assets.ubuntu.com/v1/vanilla-framework-version-4.21.0.min.css" />

  <style>
    /* ── colour cells ───────────────────────────────────────────────── */
    .color-cell {
      width: 2rem;
      height: 1.5rem;
      border-radius: .25rem;
      display: inline-block;
      vertical-align: middle;
      border: 1px solid rgba(0, 0, 0, .15);
      text-align: center;
      font-size: .75rem;
      font-weight: 700;
      line-height: 1.5rem;
      color: #fff;
    }
    .color-cell--green  { background-color: #0e8420; }
    .color-cell--orange { background-color: #e95420; }
    .color-cell--red    { background-color: #c7162b; }
    .color-cell--blue   { background-color: #007aa6; }
    .color-cell--black  { background-color: #111; }
    .color-cell--white  { background-color: #fff; border-color: #999; color: #666; }
    .color-cell--purple { background-color: #7c5295; }

    /* ── carry-over badge ───────────────────────────────────────────── */
    .carry-over-badge {
      display: inline-block;
      min-width: 1.5rem;
      padding: 0 .35rem;
      border-radius: .75rem;
      background-color: #7c5295;
      color: #fff;
      font-size: .75rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.5rem;
    }

    /* ── filter bar ─────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }
    .filter-bar .p-form__group { margin-bottom: 0; }

    /* ── product section ────────────────────────────────────────────── */
    .product-section { margin-bottom: 2rem; }
    .product-section h3 { margin-bottom: .5rem; }

    /* ── cycle columns (auto-generated) ─────────────────────────────── */
    .cycle-header { min-width: 4rem; text-align: center; }

    /* ── cycle → objective layout ──────────────────────────────────── */
    .cycle-section { margin-bottom: 2.5rem; }
    .cycle-section h2 { margin-bottom: .75rem; }

    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .product-column {
      width: 100%;
    }
    .product-column h4 { margin-bottom: .25rem; }

    /* ── summary truncation ─────────────────────────────────────────── */
    .summary-cell {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .summary-cell a.summary-link,
    .summary-cell a.summary-link:visited,
    .summary-cell a.summary-link:active {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      color: #000;
      text-decoration: none;
      max-width: 100%;
      opacity: 1;
    }
    .summary-cell a.summary-link:hover {
      text-decoration: underline;
    }
    .summary-link .p-icon--external-link {
      flex-shrink: 0;
      opacity: .4;
    }
    .summary-link:hover .p-icon--external-link {
      opacity: 1;
    }
    .jira-link {
      margin-left: .35rem;
      vertical-align: middle;
      opacity: .5;
    }
    .jira-link:hover { opacity: 1; }

    /* ── align "Roadmap" text to bottom of logo ─────────────────── */
    .p-navigation__logo-title {
      align-self: flex-end;
    }

    /* ── clickable legend filters ───────────────────────────────── */
    .legend-filter {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .1rem;
      cursor: pointer;
      padding: .25rem .5rem;
      border-radius: .25rem;
      border: 2px solid transparent;
      transition: opacity .15s, border-color .15s;
      user-select: none;
      min-width: 4.5rem;
      text-align: center;
    }
    .legend-filter .legend-top {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }
    .legend-filter:hover {
      border-color: #999;
    }
    .legend-filter.is-active {
      border-color: #007aa6;
      background: rgba(0, 122, 166, .08);
    }
    .legend-filter.is-dimmed {
      opacity: .35;
    }

    /* ── inline stat under each legend button ───────────────────── */
    .legend-stat {
      font-size: .7rem;
      font-weight: 600;
      color: #666;
      line-height: 1;
      white-space: nowrap;
    }

    /* ── carry-over legend item (same column layout as filters) ── */
    .legend-item-static {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .1rem;
      padding: .25rem .5rem;
      min-width: 4.5rem;
      text-align: center;
      font-size: .875rem;
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <header id="navigation" class="p-navigation">
    <div class="p-navigation__row--full-width">
      <div class="p-navigation__banner">
        <div class="p-navigation__tagged-logo">
          <a class="p-navigation__link" href="/">
            <div class="p-navigation__logo-tag">
              <img class="p-navigation__logo-icon" src="https://assets.ubuntu.com/v1/82818827-CoF_white.svg" alt="" />
            </div>
            <span class="p-navigation__logo-title">Roadmap</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="l-main">
    <div class="row">
      {% block content %}{% endblock %}
    </div>
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
