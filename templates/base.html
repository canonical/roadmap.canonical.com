<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="shortcut icon"
      href="https://assets.ubuntu.com/v1/e6b1c303-COF%20favicon.ico"
      type="image/x-icon">
  <title>{% block title %}Roadmap{% endblock %}</title>

  <!-- Vanilla Framework from CDN -->
  <link rel="stylesheet" href="https://assets.ubuntu.com/v1/vanilla-framework-version-4.21.0.min.css" />

  <style>
    /* ── colour cells ───────────────────────────────────────────────── */
    .color-cell {
      width: 1.6rem;
      height: 1.2rem;
      border-radius: .2rem;
      display: inline-block;
      vertical-align: middle;
      border: 1px solid rgba(0, 0, 0, .15);
      text-align: center;
      font-size: .65rem;
      font-weight: 700;
      line-height: 1.2rem;
      color: #fff;
    }
    .color-cell--green  { background-color: #0e8420; }
    .color-cell--orange { background-color: #ff9900; }
    .color-cell--red    { background-color: #c7162b; }
    .color-cell--blue   { background-color: #007aa6; }
    .color-cell--black  { background-color: #111; }
    .color-cell--white  { background-color: #fff; border-color: #999; color: #666; }
    .color-cell--purple { background-color: #7c5295; }

    /* ── carry-over badge ───────────────────────────────────────────── */
    .carry-over-badge {
      display: inline-block;
      min-width: 1.2rem;
      padding: 0 .25rem;
      border-radius: .6rem;
      background-color: #7c5295;
      color: #fff;
      font-size: .65rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.2rem;
    }

    /* ── filter bar ─────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }
    .filter-bar .p-form__group { margin-bottom: 0; }

    /* ── product section ────────────────────────────────────────────── */
    .product-section { margin-bottom: 2rem; }
    .product-section h3 { margin-bottom: .5rem; }

    /* ── cycle columns (auto-generated) ─────────────────────────────── */
    .cycle-header { min-width: 4rem; text-align: center; }

    /* ── cycle → objective layout ──────────────────────────────────── */
    .cycle-section { margin-bottom: 1.25rem; }
    .cycle-section h2 { margin-bottom: .5rem; }

    .product-grid {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .product-column {
      width: 100%;
    }
    .product-column h4 { margin-bottom: .15rem; font-size: .95rem; }

    /* ── compact epic rows (single-line flexbox) ────────────────────── */
    .epic-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .epic-row {
      display: flex;
      align-items: center;
      gap: .35rem;
      padding: .15rem 0;
      font-size: .8rem;
      line-height: 1.3;
      border-bottom: 1px solid rgba(0, 0, 0, .05);
    }
    .epic-row:last-child { border-bottom: none; }
    .epic-row__carry-over {
      flex: 0 0 1.5rem;
      text-align: center;
    }
    .epic-row__health {
      flex: 0 0 2rem;
    }
    .epic-row__summary {
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .epic-row__summary a.summary-link,
    .epic-row__summary a.summary-link:visited,
    .epic-row__summary a.summary-link:active {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      color: #000;
      text-decoration: none;
      max-width: 100%;
      opacity: 1;
    }
    .epic-row__summary a.summary-link:hover {
      text-decoration: underline;
    }
    .summary-link .p-icon--external-link {
      flex-shrink: 0;
      opacity: .4;
    }
    .summary-link:hover .p-icon--external-link {
      opacity: 1;
    }
    .jira-link {
      margin-left: .35rem;
      vertical-align: middle;
      opacity: .5;
    }
    .jira-link:hover { opacity: 1; }

    /* ── align "Roadmap" text to bottom of logo ─────────────────── */
    .p-navigation__logo-title {
      align-self: flex-end;
    }

    /* ── clickable legend filters ───────────────────────────────── */
    .legend-filter {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .1rem;
      cursor: pointer;
      padding: .25rem .5rem;
      border-radius: .25rem;
      border: 2px solid transparent;
      transition: opacity .15s, border-color .15s;
      user-select: none;
      min-width: 4.5rem;
      text-align: center;
    }
    .legend-filter .legend-top {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }
    .legend-filter:hover {
      border-color: #999;
    }
    .legend-filter.is-active {
      border-color: #007aa6;
      background: rgba(0, 122, 166, .08);
    }
    .legend-filter.is-dimmed {
      opacity: .35;
    }

    /* ── inline stat under each legend button ───────────────────── */
    .legend-stat {
      font-size: .7rem;
      font-weight: 600;
      color: #666;
      line-height: 1;
      white-space: nowrap;
    }

    /* ── carry-over legend item (same column layout as filters) ── */
    .legend-item-static {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .1rem;
      padding: .25rem .5rem;
      min-width: 4.5rem;
      text-align: center;
      font-size: .875rem;
    }
    /* ── sync-status indicator ──────────────────────────────────── */
    .sync-indicator {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      cursor: default;
      position: relative;
      padding: .25rem .5rem;
      color: #fff;
      font-size: .8rem;
      white-space: nowrap;
    }
    .sync-icon {
      width: 1.8rem;
      height: 1.8rem;
      flex-shrink: 0;
    }
    .sync-icon--ok    { color: #0e8420; }
    .sync-icon--stale { color: #e95420; }
    .sync-icon--none  { color: #999; }
    .sync-icon--fail  { color: #c7162b; }

    .sync-tooltip {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: .35rem;
      background: #333;
      color: #fff;
      padding: .5rem .75rem;
      border-radius: .25rem;
      font-size: .75rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 28rem;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .sync-indicator:hover .sync-tooltip { display: block; }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <header id="navigation" class="p-navigation">
    <div class="p-navigation__row--full-width">
      <div class="p-navigation__banner">
        <div class="p-navigation__tagged-logo">
          <a class="p-navigation__link" href="/">
            <div class="p-navigation__logo-tag">
              <img class="p-navigation__logo-icon" src="https://assets.ubuntu.com/v1/82818827-CoF_white.svg" alt="" />
            </div>
            <span class="p-navigation__logo-title">Roadmap</span>
          </a>
        </div>
      </div>
      <nav class="p-navigation__nav" style="display:flex;align-items:center;justify-content:flex-end;">
        <span id="sync-indicator" class="sync-indicator" aria-label="Sync status">
          <svg id="sync-icon" class="sync-icon sync-icon--none" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
          <span id="sync-label">…</span>
          <span class="sync-tooltip" id="sync-tooltip">Loading sync info…</span>
        </span>
      </nav>
    </div>
  </header>

  <main class="l-main">
    <div class="row">
      {% block content %}{% endblock %}
    </div>
  </main>

  {% block scripts %}{% endblock %}

  <script>
  /* ── Sync-status indicator ──────────────────────────────────── */
  (function() {
    function humanDuration(totalSeconds) {
      if (totalSeconds == null) return '—';
      var abs = Math.abs(totalSeconds);
      if (abs < 120) return Math.round(abs) + ' min';
      var h = abs / 3600;
      if (h < 48) return h.toFixed(1) + ' h';
      return (h / 24).toFixed(1) + ' d';
    }

    function refreshSync() {
      fetch('/api/v1/sync/schedule')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var icon  = document.getElementById('sync-icon');
          var label = document.getElementById('sync-label');
          var tip   = document.getElementById('sync-tooltip');

          if (!d.configured || d.last_sync_end == null) {
            icon.className = 'sync-icon sync-icon--none';
            label.textContent = 'No sync yet';
            tip.textContent   = 'The scheduler has not completed a sync yet.';
            return;
          }

          // Compute durations client-side from ISO timestamps so the
          // display is always relative to the *browser* clock and immune
          // to server ↔ client clock skew.
          var nowMs   = Date.now();
          var sinceSec = d.last_sync_end
                         ? Math.round((nowMs - new Date(d.last_sync_end).getTime()) / 1000)
                         : null;
          var untilSec = d.next_sync_at
                         ? Math.round((new Date(d.next_sync_at).getTime() - nowMs) / 1000)
                         : null;
          var sinceStr = humanDuration(sinceSec);
          var untilStr = untilSec != null && untilSec > 0
                         ? humanDuration(untilSec)
                         : 'soon';

          if (d.last_sync_ok === false) {
            icon.className = 'sync-icon sync-icon--fail';
            label.textContent = 'Sync failed';
          } else if (sinceSec != null && sinceSec > d.interval_seconds * 2) {
            icon.className = 'sync-icon sync-icon--stale';
            label.textContent = sinceStr + ' ago';
          } else {
            icon.className = 'sync-icon sync-icon--ok';
            label.textContent = sinceStr + ' ago';
          }

          var lines = [];
          lines.push('Last sync: ' + sinceStr + ' ago');
          lines.push('Next sync: ' + untilStr);
          lines.push('Interval: ' + humanDuration(d.interval_seconds));
          if (d.last_sync_end) {
            lines.push('Finished: ' + new Date(d.last_sync_end).toLocaleString());
          }
          if (d.error_message) {
            lines.push('Error: ' + d.error_message);
          }
          tip.textContent = lines.join('\n');
          tip.style.whiteSpace = 'pre';
        })
        .catch(function() {
          document.getElementById('sync-icon').className = 'sync-icon sync-icon--none';
          document.getElementById('sync-label').textContent = '—';
        });
    }

    refreshSync();
    // Refresh every 60 s so the "ago" label stays current
    setInterval(refreshSync, 60000);
  })();
  </script>
</body>
</html>
