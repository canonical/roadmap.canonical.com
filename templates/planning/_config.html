<div>
  <div class="config-grid">
    <div>
      <label for="efficiency">Team Efficiency</label>
      <input type="range" id="efficiency" min="0.1" max="1.0" step="0.05"
             value="{{ config.team_efficiency if config else 0.60 }}"
             onchange="updateConfig('team_efficiency', this.value)">
      <span id="eff-val">{{ config.team_efficiency if config else 0.60 }}</span>
    </div>
    <div>
      <label for="cfg-cycle">Planning Cycle</label>
      <select id="cfg-cycle" onchange="updateConfig('cycle_id', this.value)">
        {% for c in cycles %}
        <option value="{{ c.cycle }}" {% if config and config.cycle_id == c.cycle %}selected{% endif %}>{{ c.cycle }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
<script>
(function() {
  var productId = {{ product_id }};
  window.updateConfig = function(field, value) {
    var data = { cycle_id: document.getElementById('cfg-cycle').value, team_efficiency: parseFloat(document.getElementById('efficiency').value) };
    fetch('/api/v1/products/' + productId + '/planning-config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function() {
      document.getElementById('eff-val').textContent = data.team_efficiency;
    });
  };
})();
</script>
