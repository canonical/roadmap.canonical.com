name: Tests

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roadmap
          POSTGRES_PASSWORD: roadmap
          POSTGRES_DB: roadmap_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U roadmap"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run tests
        run: pytest -v
